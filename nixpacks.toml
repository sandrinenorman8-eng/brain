[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = ["python -m pip install --upgrade pip", "python -m pip install -r requirements.txt"]

[phases.build]
cmds = ["python -m pip install -r requirements.txt"]

[start]
cmd = "gunicorn --workers 2 --bind 0.0.0.0:$PORT --timeout 120 app_new:app"
